services:
  postgres:
    image: postgres:16-alpine
    container_name: aetheris-postgres
    environment:
      POSTGRES_DB: aetheris
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./database/postgres:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: aetheris-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/aetheris
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    volumes:
      - ./database/chroma:/app/database/chroma

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: aetheris-frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"